<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX TRADER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030609;
  --surface: #070f18;
  --surface2: #0a1624;
  --border: #0e2133;
  --border2: #1a3a55;
  --accent: #00e5ff;
  --accent2: #0099bb;
  --green: #00ff88;
  --red: #ff3055;
  --yellow: #ffd000;
  --text: #c8e4f0;
  --text-dim: #375f75;
  --text-mid: #5a90a8;
  --glow: rgba(0,229,255,.12);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  overflow-x: hidden;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,.018) 2px, rgba(0,229,255,.018) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ─────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  background: rgba(3,6,9,.96);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .3;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 15px;
  letter-spacing: 6px;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(0,229,255,.4);
}
.logo span { color: var(--green); }

.hcenter {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.live-dot {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--green);
  font-size: 10px;
  letter-spacing: 2px;
}
.pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .4; transform: scale(.7); }
}

#clock {
  color: var(--accent);
  letter-spacing: 2px;
  font-size: 12px;
}

.hright { display: flex; align-items: center; gap: 8px; }

.hbtn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-mid);
  padding: 5px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 2px;
  transition: all .2s;
}
.hbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--glow); }
.hbtn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.08); }

/* Market status pill */
.mstatus {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 2px;
  letter-spacing: 1px;
  font-family: 'Orbitron', monospace;
}
.mstatus.open  { background: rgba(0,255,136,.08); color: var(--green); border: 1px solid rgba(0,255,136,.3); }
.mstatus.closed{ background: rgba(255,48,85,.06);  color: var(--red);   border: 1px solid rgba(255,48,85,.2); }

/* ── LAYOUT ─────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: 1fr;
  height: calc(100vh - 52px);
}

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sb-header {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--text-dim);
}

.asset-list { flex: 1; overflow-y: auto; padding: 8px; }

.asset-card {
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 12px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  background: var(--surface2);
}
.asset-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--border2);
  transition: background .2s;
}
.asset-card:hover { border-color: var(--border2); }
.asset-card.active { border-color: rgba(0,229,255,.4); background: rgba(0,229,255,.04); }
.asset-card.active::before { background: var(--accent); }
.asset-card.buy::before { background: var(--green); }
.asset-card.sell::before { background: var(--red); }
.asset-card.hold::before { background: var(--yellow); }

.ac-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 4px;
}
.ac-sym {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}
.ac-name { font-size: 8px; color: var(--text-dim); letter-spacing: 1px; margin-top: 1px; }
.ac-price {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-align: right;
}
.ac-chg { font-size: 9px; text-align: right; margin-top: 1px; }
.pos { color: var(--green); } .neg { color: var(--red); }

.ac-signal {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 7px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}
.sig-badge {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 2px;
  letter-spacing: 1px;
}
.sig-badge.buy  { background: rgba(0,255,136,.1);  color: var(--green); border: 1px solid rgba(0,255,136,.3); }
.sig-badge.sell { background: rgba(255,48,85,.1);  color: var(--red);   border: 1px solid rgba(255,48,85,.3); }
.sig-badge.hold { background: rgba(255,208,0,.07); color: var(--yellow);border: 1px solid rgba(255,208,0,.25); }
.sig-badge.wait { background: rgba(50,80,100,.15); color: var(--text-dim); border: 1px solid var(--border); }

.sig-str { font-size: 9px; color: var(--text-dim); }
.sig-str span { color: var(--text-mid); font-family: 'Orbitron', monospace; font-size: 9px; }

.ac-inds {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  margin-top: 5px;
  font-size: 8px;
  color: var(--text-dim);
}
.ind-val { color: var(--text-mid); }
.ind-bull { color: var(--green) !important; }
.ind-bear { color: var(--red) !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── MAIN CHART AREA ─────────────────────────── */
.main {
  display: grid;
  grid-template-rows: 1fr auto;
  overflow: hidden;
}

.chart-area { position: relative; background: #131722; overflow: hidden; }

/* TradingView iframe fills the chart area */
#tv-container {
  width: 100%;
  height: 100%;
}
#tv-container iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.chart-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: linear-gradient(180deg, rgba(3,6,9,.85) 0%, transparent 100%);
  pointer-events: none;
  z-index: 10;
}
.co-left { display: flex; align-items: center; gap: 12px; }
.co-sym { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
.co-name { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; margin-top: 2px; }

/* TF toolbar */
.tf-bar {
  position: absolute;
  bottom: 10px; left: 10px;
  display: flex;
  align-items: center;
  gap: 3px;
  z-index: 10;
  pointer-events: all;
  background: rgba(3,6,9,.8);
  border: 1px solid var(--border);
  padding: 4px 6px;
  border-radius: 3px;
  backdrop-filter: blur(8px);
}
.tf-btn {
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 3px 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 2px;
  transition: all .15s;
}
.tf-btn:hover { color: var(--text); background: var(--surface2); }
.tf-btn.active { color: var(--accent); background: rgba(0,229,255,.08); }

/* ── BOTTOM PANEL ─────────────────────────────── */
.bottom-panel {
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: var(--surface);
  max-height: 160px;
}

.bp-section {
  padding: 10px 14px;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.bp-section:last-child { border-right: none; }

.bp-title {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.bp-title::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--accent);
}

/* Signal details */
.sig-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.sig-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 5px 8px;
  text-align: center;
}
.sig-cell-label { font-size: 7px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 2px; }
.sig-cell-val { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; }

/* Alerts */
.alert-list { overflow-y: auto; max-height: 110px; }
.alert-item {
  display: flex;
  gap: 7px;
  padding: 3px 0;
  border-bottom: 1px solid rgba(14,33,51,.8);
  font-size: 9px;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-2px)} to{opacity:1;transform:none} }
.al-time { color: var(--text-dim); min-width: 46px; }
.al-sym  { color: var(--accent); font-family: 'Orbitron', monospace; font-size: 8px; min-width: 52px; }
.al-msg.buy  { color: var(--green); }
.al-msg.sell { color: var(--red); }
.al-msg.hold { color: var(--yellow); }

/* Session info */
.sess-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.sess-item { font-size: 9px; color: var(--text-dim); }
.sess-item .sv { color: var(--text-mid); }
.sess-item .sv.on { color: var(--green); }
.sess-item .sv.off { color: var(--red); }

/* ── INDICATOR BAR ───────────────────────────── */
.ind-bar {
  position: absolute;
  bottom: 10px; right: 10px;
  display: flex;
  gap: 10px;
  z-index: 10;
  background: rgba(3,6,9,.85);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 3px;
  font-size: 9px;
  backdrop-filter: blur(8px);
  pointer-events: none;
}
.ind-pill { display: flex; align-items: center; gap: 4px; }
.ind-lbl { color: var(--text-dim); }
.ind-val2 { font-family: 'Orbitron', monospace; font-size: 9px; }

/* ── RESPONSIVE ─────────────────────────────── */
@media (max-width: 700px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { max-height: 220px; }
  .asset-list { display: flex; gap: 6px; padding: 6px; overflow-x: auto; overflow-y: hidden; }
  .asset-card { min-width: 160px; margin-bottom: 0; }
  .bottom-panel { grid-template-columns: 1fr; max-height: none; }
  .bp-section { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <div class="logo">APEX<span>TRADER</span></div>
  <div class="hcenter">
    <div class="live-dot"><span class="pulse"></span> LIVE</div>
    <span id="clock">--:--:-- UTC</span>
    <span id="ny-status" class="mstatus closed">NY CLOSED</span>
  </div>
  <div class="hright">
    <button class="hbtn" onclick="cycleAsset(-1)">&#9664;</button>
    <button class="hbtn" onclick="cycleAsset(1)">&#9654;</button>
    <button class="hbtn" id="btn-indicators" onclick="toggleIndicators()">INDICATORS</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-header">&#9672; SIGNALS</div>
    <div class="asset-list" id="asset-list"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="chart-area">
      <!-- TradingView Widget -->
      <div id="tv-container"></div>

      <!-- Overlay top bar -->
      <div class="chart-overlay">
        <div class="co-left">
          <div>
            <div class="co-sym" id="co-sym">XAUUSD</div>
            <div class="co-name" id="co-name">GOLD SPOT</div>
          </div>
        </div>
      </div>

      <!-- TF selector -->
      <div class="tf-bar" id="tf-bar">
        <span style="font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-right:4px">TF</span>
        <button class="tf-btn" data-tf="1">1M</button>
        <button class="tf-btn" data-tf="5">5M</button>
        <button class="tf-btn" data-tf="15">15M</button>
        <button class="tf-btn active" data-tf="60">1H</button>
        <button class="tf-btn" data-tf="240">4H</button>
        <button class="tf-btn" data-tf="D">1D</button>
        <button class="tf-btn" data-tf="W">1W</button>
      </div>

      <!-- Indicator overlay -->
      <div class="ind-bar" id="ind-bar">
        <div class="ind-pill"><span class="ind-lbl">RSI</span><span class="ind-val2" id="i-rsi">--</span></div>
        <div class="ind-pill"><span class="ind-lbl">MACD</span><span class="ind-val2" id="i-macd">--</span></div>
        <div class="ind-pill"><span class="ind-lbl">MA20</span><span class="ind-val2" id="i-ma20">--</span></div>
        <div class="ind-pill"><span class="ind-lbl">BB</span><span class="ind-val2" id="i-bb">--</span></div>
        <div class="ind-pill"><span class="ind-lbl">SRC</span><span class="ind-val2" id="i-src" style="color:var(--text-dim);font-size:8px">--</span></div>
      </div>
    </div>

    <!-- BOTTOM PANEL -->
    <div class="bottom-panel">
      <div class="bp-section">
        <div class="bp-title">SIGNAL</div>
        <div class="sig-grid">
          <div class="sig-cell">
            <div class="sig-cell-label">DIRECTION</div>
            <div class="sig-cell-val" id="s-sig">--</div>
          </div>
          <div class="sig-cell">
            <div class="sig-cell-label">STRENGTH</div>
            <div class="sig-cell-val" id="s-str">--</div>
          </div>
          <div class="sig-cell">
            <div class="sig-cell-label">RSI STATE</div>
            <div class="sig-cell-val" id="s-rsi">--</div>
          </div>
          <div class="sig-cell">
            <div class="sig-cell-label">TREND</div>
            <div class="sig-cell-val" id="s-trend">--</div>
          </div>
        </div>
      </div>

      <div class="bp-section">
        <div class="bp-title">ALERTS</div>
        <div class="alert-list" id="alert-list">
          <div style="color:var(--text-dim);font-size:9px">Waiting for data...</div>
        </div>
      </div>

      <div class="bp-section">
        <div class="bp-title">SESSION</div>
        <div class="sess-grid" id="sess-grid"></div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ================================================================
// ASSETS
// ================================================================
var ASSETS = [
  { sym:'XAUUSD',  name:'GOLD SPOT',  tv:'OANDA:XAUUSD',  isCrypto:false },
  { sym:'BTCUSD',  name:'BITCOIN',    tv:'BINANCE:BTCUSDT',isCrypto:true  },
];

var currentIdx  = 0;
var currentTF   = '60';
var priceData   = {}; // sym -> {price, change, changePct, history:[]}
var signals     = {}; // sym -> {sig, str, rsi, macd, ma20, bb}
var alertsLog   = [];
var lastSig     = {};
var indVisible  = true;

// ================================================================
// CLOCK + MARKET STATUS
// ================================================================
function updateClock() {
  var now = new Date();
  document.getElementById('clock').textContent = now.toUTCString().substring(17,25) + ' UTC';
  var h = now.getUTCHours(), d = now.getUTCDay();
  var nyOpen = d>=1 && d<=5 && h>=13 && h<20;
  var el = document.getElementById('ny-status');
  el.textContent = nyOpen ? 'NY OPEN' : 'NY CLOSED';
  el.className = 'mstatus ' + (nyOpen ? 'open' : 'closed');
}
setInterval(updateClock, 1000);
updateClock();

// ================================================================
// PRICE DATA - OKX for Gold, Coinbase for BTC
// ================================================================
// Price cache from TradingView quote feed
var tvPriceCache = {};

// Listen for price updates from TradingView iframe via postMessage
window.addEventListener('message', function(e) {
  try {
    var d = e.data;
    if (d && d.name === 'quoteUpdate' && d.data) {
      var sym = d.data.n || d.data.symbol;
      var price = d.data.v && (d.data.v.lp || d.data.v.last_price || d.data.v.close);
      if (sym && price) {
        if (sym.includes('XAU')) tvPriceCache['XAUUSD'] = +price;
        if (sym.includes('BTC')) tvPriceCache['BTCUSD'] = +price;
      }
    }
  } catch(e2) {}
});

async function fetchPrice(asset) {
  // 1. Use TradingView cached price if available and fresh (within 30s)
  if (tvPriceCache[asset.sym] && tvPriceCache[asset.sym + '_t'] && Date.now() - tvPriceCache[asset.sym + '_t'] < 30000) {
    return tvPriceCache[asset.sym];
  }

  if (asset.sym === 'BTCUSD') {
    try {
      var r = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot', {signal:AbortSignal.timeout(6000)});
      if (r.ok) { var j=await r.json(); var p=+j.data.amount; if(p>0) return p; }
    } catch(e) {}
    try {
      var r2 = await fetch('https://api.kraken.com/0/public/Ticker?pair=XBTUSD', {signal:AbortSignal.timeout(6000)});
      if (r2.ok) { var j2=await r2.json(); var p2=+j2.result.XXBTZUSD.c[0]; if(p2>0) return p2; }
    } catch(e) {}
  }

  if (asset.sym === 'XAUUSD') {
    // Try multiple OKX endpoints, pick highest (most likely to be spot-closest)
    var prices = [];
    try {
      var r3 = await fetch('https://www.okx.com/api/v5/market/ticker?instId=XAU-USD_UM-SWAP&t='+Date.now(), {signal:AbortSignal.timeout(5000), cache:'no-store'});
      if (r3.ok) { var j3=await r3.json(); var p3=j3.data&&j3.data[0]&&+j3.data[0].last; if(p3>1000) prices.push(p3); }
    } catch(e) {}
    try {
      var r4 = await fetch('https://www.okx.com/api/v5/market/index-tickers?instId=XAU-USD&t='+Date.now(), {signal:AbortSignal.timeout(5000), cache:'no-store'});
      if (r4.ok) { var j4=await r4.json(); var p4=j4.data&&j4.data[0]&&+j4.data[0].idxPx; if(p4>1000) prices.push(p4); }
    } catch(e) {}
    // Use average of available prices to reduce stale single-source issue
    if (prices.length) return prices.reduce(function(a,b){return a+b;},0)/prices.length;
  }
  return null;
}

async function fetchOHLC(asset, tf) {
  if (asset.sym === 'BTCUSD') {
    try {
      var interval = {'1':1,'5':5,'15':15,'60':60,'240':240,'D':1440,'W':10080}[tf]||60;
      var since = Math.floor(Date.now()/1000) - interval*60*200;
      var r = await fetch('https://api.kraken.com/0/public/OHLC?pair=XBTUSD&interval='+interval+'&since='+since, {signal:AbortSignal.timeout(10000)});
      if (!r.ok) return null;
      var j = await r.json();
      var raw = j.result && j.result.XXBTZUSD;
      if (!raw || !raw.length) return null;
      return raw.map(function(k){return{time:+k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[6]};});
    } catch(e) { return null; }
  }
  if (asset.sym === 'XAUUSD') {
    var bar = {'1':'1m','5':'5m','15':'15m','60':'1H','240':'4H','D':'1D','W':'1W'}[tf]||'1H';
    try {
      var r2 = await fetch('https://www.okx.com/api/v5/market/candles?instId=XAU-USD_UM-SWAP&bar='+bar+'&limit=200', {signal:AbortSignal.timeout(10000)});
      if (!r2.ok) throw new Error();
      var j2 = await r2.json();
      var data = j2&&j2.data; if(!data||data.length<5) throw new Error();
      return data.slice().reverse().map(function(k){return{time:Math.floor(+k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]};});
    } catch(e) {}
    try {
      var r3 = await fetch('https://www.okx.com/api/v5/market/index-candles?instId=XAU-USD&bar='+bar+'&limit=200', {signal:AbortSignal.timeout(10000)});
      if (!r3.ok) return null;
      var j3 = await r3.json();
      var data2 = j3&&j3.data; if(!data2||data2.length<5) return null;
      return data2.slice().reverse().map(function(k){return{time:Math.floor(+k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:0};});
    } catch(e) { return null; }
  }
  return null;
}

// ================================================================
// TECHNICAL ANALYSIS
// ================================================================
function calcRSI(p, n) {
  n=n||14; if(p.length<n+2) return null;
  var g=0,l=0;
  for(var i=p.length-n;i<p.length;i++){var d=p[i]-p[i-1];d>0?g+=d:l+=Math.abs(d);}
  var ag=g/n,al=l/n; return al===0?100:100-(100/(1+(ag/al)));
}
function calcEMA(p,n){
  if(p.length<n) return null;
  var k=2/(n+1),e=p.slice(0,n).reduce(function(a,b){return a+b;},0)/n;
  for(var i=n;i<p.length;i++) e=p[i]*k+e*(1-k); return e;
}
function calcSMA(p,n){
  if(p.length<n) return null;
  return p.slice(-n).reduce(function(a,b){return a+b;},0)/n;
}
function calcBB(p,n){
  n=n||20; var s=calcSMA(p,n); if(!s) return null;
  var sl=p.slice(-n),std=Math.sqrt(sl.reduce(function(a,b){return a+(b-s)*(b-s);},0)/n);
  return{u:s+2*std,l:s-2*std,m:s};
}
function genSignal(closes) {
  if(!closes||closes.length<20) return{sig:'hold',str:20,rsi:null,macd:null,ma20:null,bb:null};
  var price=closes[closes.length-1];
  var rsi=calcRSI(closes);
  var ema12=calcEMA(closes,12),ema26=calcEMA(closes,26);
  var macd=(ema12&&ema26)?ema12-ema26:null;
  var ma20=calcSMA(closes,20),ma10=calcSMA(closes,10);
  var bb=calcBB(closes);
  var buy=0,sell=0;
  if(rsi!=null){rsi<30?buy+=35:rsi>70?sell+=35:rsi<50?buy+=10:sell+=10;}
  if(macd!=null){macd>0?buy+=20:sell+=20;}
  if(ma10&&ma20){ma10>ma20?buy+=15:sell+=15;}
  if(ma20){price<ma20*.99?buy+=10:price>ma20*1.01?sell+=10:0;}
  if(bb){if(price<bb.l)buy+=20;else if(price>bb.u)sell+=20;}
  var total=(buy+sell)||1;
  var sig,str;
  if(buy-sell>20)     {sig='buy'; str=Math.min(99,Math.round(buy/total*100));}
  else if(sell-buy>20){sig='sell';str=Math.min(99,Math.round(sell/total*100));}
  else                {sig='hold';str=Math.round(Math.max(buy,sell)/total*100);}
  return{sig:sig,str:str,rsi:rsi,macd:macd,ma20:ma20,bb:bb};
}

function fmtPrice(n,sym){
  if(!n||isNaN(n)) return '--';
  if(sym==='BTCUSD') return '$'+Math.round(n).toLocaleString('en-US');
  return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function ts(){return new Date().toTimeString().substring(0,8);}

async function loadSignal(asset) {
  var ohlc = await fetchOHLC(asset, currentTF);
  if (!ohlc || ohlc.length < 20) return;
  var closes = ohlc.map(function(k){return k.close;});
  var price   = await fetchPrice(asset) || closes[closes.length-1];
  closes[closes.length-1] = price;

  var sig = genSignal(closes);
  signals[asset.sym] = sig;

  if (!priceData[asset.sym]) priceData[asset.sym] = {};
  priceData[asset.sym].price   = price;
  priceData[asset.sym].history = closes;

  // Approximate 24h change from first/last
  var prev24 = closes.length>24 ? closes[closes.length-25] : closes[0];
  priceData[asset.sym].change    = price - prev24;
  priceData[asset.sym].changePct = ((price-prev24)/prev24)*100;

  updateSidebarCard(asset);
  if (ASSETS[currentIdx].sym === asset.sym) updateBottomPanel(asset, sig, price, closes);
  logAlert(asset, sig, price);
  updateSession();
}

// Gauge: needle rotates from -90deg (full sell/left) to +90deg (full buy/right)
// -90 = strong sell, 0 = hold, +90 = strong buy
function sigToAngle(sig) {
  if (sig.sig === 'buy')  return Math.min(85,  20 + sig.str * 0.65);
  if (sig.sig === 'sell') return Math.max(-85, -20 - sig.str * 0.65);
  // hold: drift slightly based on RSI
  var rsiPush = sig.rsi ? (sig.rsi - 50) * 0.3 : 0;
  return Math.max(-18, Math.min(18, rsiPush));
}

var gaugeAngles  = {};
var gaugeTimers  = {};

function updateGauge(sym, sig) {
  var needle = document.getElementById('gneedle-'+sym);
  var gval   = document.getElementById('gval-'+sym);
  if (!needle || !gval) return;

  var angle = sigToAngle(sig);
  gaugeAngles[sym] = angle;
  needle.style.transform = 'rotate(' + angle + 'deg)';

  var label = sig.sig==='buy'  ? '▲ BUY '  + sig.str + '%'
            : sig.sig==='sell' ? '▼ SELL ' + sig.str + '%'
            : '◆ HOLD';
  gval.textContent = label;
  gval.className   = 'gauge-val ' + sig.sig;

  // Update needle color to match signal
  var col = sig.sig==='buy' ? '#00ff88' : sig.sig==='sell' ? '#ff3055' : '#ffd000';
  needle.setAttribute('stroke', col);
}

function startGaugeDrift(sym) {
  if (gaugeTimers[sym]) clearInterval(gaugeTimers[sym]);
  gaugeTimers[sym] = setInterval(function() {
    var sig = signals[sym];
    if (!sig) return;
    var needle = document.getElementById('gneedle-'+sym);
    if (!needle) return;
    var base  = sigToAngle(sig);
    var cur   = gaugeAngles[sym] || base;
    var drift = (Math.random() - 0.5) * 6;
    var next  = cur + (base - cur) * 0.4 + drift;
    // Clamp within signal zone
    if (sig.sig==='buy')  next = Math.max(15,  Math.min(88,  next));
    if (sig.sig==='sell') next = Math.min(-15, Math.max(-88, next));
    if (sig.sig==='hold') next = Math.max(-20, Math.min(20,  next));
    gaugeAngles[sym] = next;
    needle.style.transform = 'rotate(' + next.toFixed(1) + 'deg)';
    // Update color continuously
    var col = next > 15 ? '#00ff88' : next < -15 ? '#ff3055' : '#ffd000';
    needle.setAttribute('stroke', col);
    if (gval) {
      gval.className = 'gauge-val ' + (next>15?'buy':next<-15?'sell':'hold');
    }
  }, 1000);
}

  updateGauge(asset.sym, s);

}

// ================================================================
// LIVE PRICE POLLING (updates sidebar cards)
// ================================================================
function startPolling() {
  async function poll() {
    for (var i = 0; i < ASSETS.length; i++) {
      var asset = ASSETS[i];
      var price = await fetchPrice(asset);
      if (!price) continue;

      if (!priceData[asset.sym]) priceData[asset.sym] = { history:[], price:price, change:0, changePct:0 };
      var prev = priceData[asset.sym].price || price;
      priceData[asset.sym].price = price;

      // Flash price color
      var pEl = document.getElementById('cp-'+asset.sym);
      if (pEl) {
        pEl.style.color = price >= prev ? 'var(--green)' : 'var(--red)';
        pEl.textContent = fmtPrice(price, asset.sym);
        setTimeout(function(el){ el.style.color = 'var(--text)'; }.bind(null, pEl), 500);
      }

      // Update change % using stored history baseline
      var h = priceData[asset.sym].history;
      if (h && h.length > 1) {
        var base = h.length > 24 ? h[h.length - 25] : h[0];
        priceData[asset.sym].change    = price - base;
        priceData[asset.sym].changePct = ((price - base) / base) * 100;
        // Update change display
        var chgEl = document.getElementById('cc-'+asset.sym);
        if (chgEl) {
          var chg = priceData[asset.sym].changePct;
          chgEl.className = 'ac-chg ' + (chg >= 0 ? 'pos' : 'neg');
          chgEl.textContent = (chg >= 0 ? '▲ ' : '▼ ') + Math.abs(chg).toFixed(2) + '%';
        }
      }

      // Update indicator bar if this is the active asset
      if (ASSETS[currentIdx].sym === asset.sym) {
        var sig = signals[asset.sym];
        var closes = priceData[asset.sym].history;
        if (sig && closes && closes.length) {
          closes[closes.length-1] = price;
          updateBottomPanel(asset, sig, price, closes);
        }
      }
    }
  }

  poll();
  setInterval(poll, 5000);

  // Full signal reload every 3 minutes
  setInterval(function(){ ASSETS.forEach(loadSignal); }, 180000);

  // Immediate refresh on tab focus
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible') poll();
  });
}

// Polls TV's public quote endpoint - same data source as their charts
// ================================================================
async function fetchTVQuote(tvSymbol, ourSym) {
  try {
    // TradingView public quote endpoint - no auth needed
    var url = 'https://symbol-search.tradingview.com/symbol_search/v3/?text='+encodeURIComponent(tvSymbol)+'&hl=1&exchange=&lang=en&search_type=undefined&domain=production';
    // Actually use their scanner/quote endpoint
    var body = JSON.stringify({
      symbols: { tickers: [tvSymbol], query: { types: [] } },
      columns: ['close','change','change_abs','volume']
    });
    var r = await fetch('https://scanner.tradingview.com/forex/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body,
      signal: AbortSignal.timeout(6000)
    });
    if (!r.ok) return null;
    var j = await r.json();
    var d = j && j.data && j.data[0] && j.data[0].d;
    if (!d || !d[0]) return null;
    var price = +d[0];
    if (price > 100) {
      tvPriceCache[ourSym] = price;
      tvPriceCache[ourSym+'_t'] = Date.now();
      return price;
    }
  } catch(e) {}
  return null;
}

  for (var i=0; i<ASSETS.length; i++) {
    var asset = ASSETS[i];
    var price = tvPriceCache[asset.sym];
    if (!price) continue;
    if (!priceData[asset.sym]) priceData[asset.sym] = {history:[], price:price, change:0, changePct:0};
    var prev = priceData[asset.sym].price || price;
    priceData[asset.sym].price = price;
    var pEl = document.getElementById('cp-'+asset.sym);
    if (pEl) {
      pEl.style.color = price>=prev ? 'var(--green)' : 'var(--red)';
      pEl.textContent = fmtPrice(price, asset.sym);
      setTimeout(function(el){ el.style.color='var(--text)'; }.bind(null,pEl), 500);
    }
    var h = priceData[asset.sym].history;
    if (h && h.length > 1) {
      var base = h.length>24 ? h[h.length-25] : h[0];
      priceData[asset.sym].change    = price - base;
      priceData[asset.sym].changePct = ((price-base)/base)*100;
      var chgEl = document.getElementById('cc-'+asset.sym);
      if (chgEl) {
        var chg = priceData[asset.sym].changePct;
        chgEl.className = 'ac-chg '+(chg>=0?'pos':'neg');
        chgEl.textContent = (chg>=0?'▲ ':'▼ ')+Math.abs(chg).toFixed(2)+'%';
      }
    }
  }
}

// ================================================================
// INIT
// ================================================================
buildSidebar();
updateSession();
ASSETS.forEach(loadSignal);
startPolling();

// Start TradingView quote polling (every 3s - matches TV chart updates)
pollTVPrices();
setInterval(pollTVPrices, 3000);
</script>
